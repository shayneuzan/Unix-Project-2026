services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - "./app/:/var/www/html"

    container_name: todo-app

    ports:
      - 80:80
      - 443:443

    networks:
      - todo-network

    depends_on:
      - db

  db:
    image: mariadb:latest

    container_name: todo-db
    
    restart: always

    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: todo_db
      MARIADB_USER: todo_user
      MARIADB_PASSWORD: todo_password
  
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    ports:
      - "3307:3306"

    networks:
      - todo-network 

  redis:
    image: redis:latest

    container_name: todo-redis

    ports: 
      - "6379:6379"

    networks: 
      - todo-network

volumes:
  mariadb_data:


networks:
  todo-network:
    driver: bridge
